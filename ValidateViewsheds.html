<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISTA</title>


    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; font-family: 'Syne', sans-serif; overflow: hidden; }
        #viewDiv { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; touch-action: none; }

        #topBar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #topBar label { color: rgba(255,255,255,0.55); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

        #locationSelect {
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: #fff;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 6px 10px; cursor: pointer; outline: none;
            transition: border-color 0.2s; min-width: 240px;
        }
        #locationSelect:hover { border-color: rgba(99,202,183,0.6); }
        #locationSelect option { background: #1a1f2b; color: #fff; }

        #layerToggleBtn {
            margin-left: auto; display: flex; align-items: center; gap: 7px;
            padding: 6px 13px; background: rgba(99,202,183,0.12);
            border: 1px solid rgba(99,202,183,0.35); border-radius: 6px;
            color: #63cab7; font-family: 'DM Mono', monospace; font-size: 11px;
            letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer;
            transition: background 0.2s, border-color 0.2s; white-space: nowrap;
        }
        #layerToggleBtn:hover { background: rgba(99,202,183,0.22); border-color: rgba(99,202,183,0.6); }

        #layerPanel {
            position: absolute; top: 52px; right: 16px; z-index: 15; width: 270px;
            background: rgba(10,14,20,0.92); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transform-origin: top right; transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #layerPanel.hidden { opacity: 0; pointer-events: none; transform: scale(0.96) translateY(-6px); }

        #layerPanelHeader {
            padding: 12px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        #layerPanelHeader span { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
        #locationLabel { font-size: 12px; font-weight: 600; color: #63cab7; font-family: 'Syne', sans-serif; letter-spacing: 0; text-transform: none; }

        #layerPanelBody { padding: 8px 0 10px; max-height: calc(100vh - 120px); overflow-y: auto; }
        #layerPanelBody::-webkit-scrollbar { width: 4px; }
        #layerPanelBody::-webkit-scrollbar-track { background: transparent; }
        #layerPanelBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .layer-group { margin-bottom: 4px; }
        .group-header { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; user-select: none; transition: background 0.15s; }
        .group-header:hover { background: rgba(255,255,255,0.04); }
        .group-chevron { width: 14px; height: 14px; color: rgba(255,255,255,0.3); flex-shrink: 0; transition: transform 0.2s; }
        .group-header.collapsed .group-chevron { transform: rotate(-90deg); }
        .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .group-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.65); flex: 1; }
        .group-count { font-size: 10px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.25); }
        .group-items { overflow: hidden; transition: max-height 0.25s ease; }
        .group-items.collapsed { max-height: 0 !important; }

        .layer-row { display: flex; align-items: center; gap: 10px; padding: 5px 14px 5px 36px; transition: background 0.12s; cursor: pointer; }
        .layer-row:hover { background: rgba(255,255,255,0.04); }
        .layer-row input[type="checkbox"] {
            appearance: none; -webkit-appearance: none; width: 14px; height: 14px;
            border: 1.5px solid rgba(255,255,255,0.25); border-radius: 3px;
            flex-shrink: 0; cursor: pointer; position: relative;
            transition: background 0.15s, border-color 0.15s;
        }
        .layer-row input[type="checkbox"]:checked { background: #63cab7; border-color: #63cab7; }
        .layer-row input[type="checkbox"]:checked::after {
            content: ''; position: absolute; left: 3px; top: 1px; width: 5px; height: 8px;
            border: 1.5px solid #0a0e14; border-top: none; border-left: none; transform: rotate(45deg);
        }
        .layer-name { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.75); flex: 1; line-height: 1.3; }
        .layer-badge { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
        .no-layers { padding: 18px 14px; text-align: center; color: rgba(255,255,255,0.25); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }
        .group-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 2px 14px; }

        #basemapWidget {
            position: absolute; bottom: 32px; left: 16px; z-index: 15;
            display: flex; flex-direction: column; gap: 6px;
        }
        .bm-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 11px; background: rgba(10,14,20,0.88);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
            color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
            cursor: pointer; transition: all 0.18s; backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .bm-btn:hover { background: rgba(99,202,183,0.12); border-color: rgba(99,202,183,0.4); color: #63cab7; }
        .bm-btn.active { background: rgba(99,202,183,0.15); border-color: #63cab7; color: #63cab7; }
        .bm-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; background-size: cover; }

        /* ── Mobile styles ─────────────────────────────────────── */
        @media (max-width: 768px) {
            #topBar { padding: 8px 12px; gap: 8px; }
            #topBar label { display: none; }
            #locationSelect { font-size: 12px; padding: 5px 8px; min-width: 0; flex: 1; }
            #layerToggleBtn { padding: 5px 10px; font-size: 10px; }

            #layerPanel { 
                width: calc(100vw - 24px); right: 12px; left: 12px;
                top: 48px; max-height: 50vh;
            }
            #layerPanelBody { max-height: calc(50vh - 60px); }

            #basemapWidget {
                bottom: 24px; left: 12px; flex-direction: row; gap: 6px;
            }
            .bm-btn { padding: 8px 10px; font-size: 10px; gap: 6px; }
            .bm-icon { width: 16px; height: 16px; }
        }

        @media (max-width: 480px) {
            #basemapWidget { bottom: 16px; left: 8px; right: 8px; justify-content: center; }
            .bm-btn { flex: 1; justify-content: center; }
        }

        #legendPanel {
            position: absolute; top: 52px; left: 16px; z-index: 15;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 10px 14px; min-width: 200px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #legendPanel.hidden { display: none; }
        #legendTitle {
            font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
            margin-bottom: 8px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        #legendCollapseBtn {
            background: none; border: none; cursor: pointer; padding: 0;
            color: rgba(255,255,255,0.3); display: flex; align-items: center;
            transition: color 0.15s;
        }
        #legendCollapseBtn:hover { color: #63cab7; }
        #legendCollapseBtn svg { width: 14px; height: 14px; transition: transform 0.2s; }
        #legendPanel.collapsed #legendCollapseBtn svg { transform: rotate(-90deg); }
        #legendPanel.collapsed #legendBody { display: none; }
        #legendPanel.collapsed #legendTitle { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

        #homeBtn {
            position: absolute; top: 52px; right: 16px; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
            color: rgba(255,255,255,0.5); cursor: pointer;
            transition: all 0.18s;
        }
        #homeBtn:hover { background: rgba(99,202,183,0.12); border-color: rgba(99,202,183,0.4); color: #63cab7; }
        #homeBtn svg { width: 15px; height: 15px; }
        #homeBtn.hidden { display: none; }

        @media (max-width: 768px) {
            #homeBtn { top: 48px; right: 12px; }
        }

        #identifyToggleBtn {
            position: absolute; bottom: 32px; right: 16px; z-index: 15;
            display: flex; align-items: center; gap: 7px;
            padding: 7px 11px; background: rgba(10,14,20,0.88);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
            color: rgba(255,255,255,0.5); font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
            cursor: pointer; transition: all 0.18s; backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        #identifyToggleBtn:hover { background: rgba(99,202,183,0.12); border-color: rgba(99,202,183,0.4); color: #63cab7; }
        #identifyToggleBtn.active { background: rgba(99,202,183,0.15); border-color: #63cab7; color: #63cab7; }
        #identifyToggleBtn svg { width: 13px; height: 13px; }

        @media (max-width: 768px) {
            #homeBtn {
            position: absolute; top: 52px; right: 16px; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
            color: rgba(255,255,255,0.5); cursor: pointer;
            transition: all 0.18s;
        }
        #homeBtn:hover { background: rgba(99,202,183,0.12); border-color: rgba(99,202,183,0.4); color: #63cab7; }
        #homeBtn svg { width: 15px; height: 15px; }
        #homeBtn.hidden { display: none; }

        @media (max-width: 768px) {
            #homeBtn { top: 48px; right: 12px; }
        }

        #identifyToggleBtn { bottom: 80px; right: 12px; }
        }

        #identifyPopup {
            position: absolute; z-index: 25; min-width: 180px;
            background: rgba(10,14,20,0.92); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
            padding: 10px 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            pointer-events: none; display: none;
        }
        #identifyPopup.visible { display: block; }
        #identifyPopupTitle {
            font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
            margin-bottom: 6px; padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #identifyPopupSwatch {
            width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15); display: inline-block; margin-right: 7px; vertical-align: middle;
        }
        #identifyPopupValue {
            font-size: 12px; font-family: 'Syne', sans-serif; color: rgba(255,255,255,0.85);
            display: flex; align-items: center;
        }
        #identifyPopupSub {
            font-size: 10px; font-family: 'DM Mono', monospace;
            color: rgba(255,255,255,0.3); margin-top: 3px; letter-spacing: 0.04em;
        }
        .legend-row {
            display: flex; align-items: center; gap: 9px;
            padding: 4px 0;
        }
        .legend-swatch {
            width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .legend-label {
            font-size: 11px; font-family: 'Syne', sans-serif;
            color: rgba(255,255,255,0.75); flex: 1;
        }
        .legend-sub {
            font-size: 9px; font-family: 'DM Mono', monospace;
            color: rgba(255,255,255,0.3); letter-spacing: 0.04em;
        }

        @media (max-width: 768px) {
            #legendPanel { top: 48px; left: 12px; min-width: 170px; }
        }
    </style>
</head>
<body>
    <div id="topBar">
        <label for="locationSelect">Location</label>
        <select id="locationSelect">
            <option value="">— Select a site —</option>
            <option value="staugybeach">St. Augustine Beach</option>
            <option value="vilano">Vilano Beach (Blue House)</option>
            <option value="staugyfort">St. Augustine Historic Fort (A1A)</option>
        </select>
        <button id="layerToggleBtn" title="Toggle layer panel">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <rect x="1" y="2" width="14" height="3" rx="1"/>
                <rect x="1" y="7" width="14" height="3" rx="1"/>
                <rect x="1" y="12" width="14" height="3" rx="1"/>
            </svg>
            Layers
        </button>
    </div>

    <div id="layerPanel" class="hidden">
        <div id="layerPanelHeader">
            <span>Layer Picker</span>
            <span id="locationLabel">No location selected</span>
        </div>
        <div id="layerPanelBody">
            <div class="no-layers">Select a location to load layers</div>
        </div>
    </div>

    <div id="legendPanel" class="hidden">
        <div id="legendTitle">
            <span id="legendTitleText">Legend</span>
            <button id="legendCollapseBtn" title="Hide legend">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 6 8 10 12 6"/>
                </svg>
            </button>
        </div>
        <div id="legendBody">
            <div id="viewshedLegend">
                <div class="legend-row">
                    <div class="legend-swatch" style="background:#D3FFBE;"></div>
                    <div>
                        <div class="legend-label">Visible</div>
                        <div class="legend-sub">True Positive</div>
                    </div>
                </div>
                <div class="legend-row">
                    <div class="legend-swatch" style="background:#FFBEBE;"></div>
                    <div>
                        <div class="legend-label">Not Visible</div>
                        <div class="legend-sub">True Negative</div>
                    </div>
                </div>
                <div class="legend-row">
                    <div class="legend-swatch" style="background:#A3FF73;"></div>
                    <div>
                        <div class="legend-label">Seen</div>
                        <div class="legend-sub">False Negative</div>
                    </div>
                </div>
                <div class="legend-row">
                    <div class="legend-swatch" style="background:#FF7F7F;"></div>
                    <div>
                        <div class="legend-label">Unseen</div>
                        <div class="legend-sub">False Positive</div>
                    </div>
                </div>
            </div>
            <div id="nlcdLegend" style="display:none;">
                <div id="nlcdLegendItems"></div>
            </div>
        </div>
    </div>

    <div id="identifyPopup">
        <div id="identifyPopupTitle">Pixel Value</div>
        <div id="identifyPopupValue"><span id="identifyPopupSwatch"></span><span id="identifyPopupLabel">—</span></div>
        <div id="identifyPopupSub" id="identifyPopupSub"></div>
    </div>

    <div id="basemapWidget">
        <button class="bm-btn" data-basemap="none">
            <span class="bm-icon" style="background:#f0f0f0; border: 1px solid rgba(255,255,255,0.15);"></span>
            None (id pixel)
        </button>
<button class="bm-btn" data-basemap="satellite">
            <span class="bm-icon" style="background:linear-gradient(135deg,#1a3a1a,#2d5a2d,#4a7c59);"></span>
            Satellite
        </button>
        <button class="bm-btn active" data-basemap="gray-vector">
            <span class="bm-icon" style="background:linear-gradient(135deg,#e8e8e8,#d0d0d0,#b8b8b8);"></span>
            Minimal
        </button>
    </div>

    <button id="homeBtn" class="hidden" title="Zoom to site extent">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 6L8 1L15 6V14H10V10H6V14H1V6Z"/>
        </svg>
    </button>

    <button id="identifyToggleBtn" title="Toggle pixel identify">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="3"/>
            <line x1="8" y1="1" x2="8" y2="3"/>
            <line x1="8" y1="13" x2="8" y2="15"/>
            <line x1="1" y1="8" x2="3" y2="8"/>
            <line x1="13" y1="8" x2="15" y2="8"/>
        </svg>
        Identify
    </button>

    <div id="viewDiv"></div>

    <script type="module">
        const [Map, MapView, GraphicsLayer, Graphic, Point, ImageryTileLayer, TileLayer, reactiveUtils, ImageryLayer] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/MapView.js",
            "@arcgis/core/layers/GraphicsLayer.js",
            "@arcgis/core/Graphic.js",
            "@arcgis/core/geometry/Point.js",
            "@arcgis/core/layers/ImageryTileLayer.js",
            "@arcgis/core/layers/TileLayer.js",
            "@arcgis/core/core/reactiveUtils.js",
            "@arcgis/core/layers/ImageryLayer.js",
        ]);

        // ── Layer defs: direct URLs — layers shared publicly, no auth needed ──
        const SLR_LAYERS = [
            { id: "int_high_ht_2040", name: "Intermediate High 2040", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHighHT_2040_Clip/MapServer", badge: "2040", badgeStyle: "slr-high", isMapServer: true },
            { id: "int_high_ht_2070", name: "Intermediate High 2070", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHighHT_2070_Clip/MapServer", badge: "2070", badgeStyle: "slr-high", isMapServer: true },
            { id: "int_high_ht_2100", name: "Intermediate High 2100", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHighHT_2100_Clip/MapServer", badge: "2100", badgeStyle: "slr-high", isMapServer: true }
        ];

        const LULC_LAYER = {
            id: "lulc_study", name: "NLCD Land Cover (Annual)",
            portalItemId: "32e2ccc6416746a9a72b4d216813f84f",
            badge: "NLCD", badgeStyle: "lulc"
        };

        // ── Location config ───────────────────────────────────────────
        const locations = {
            staugybeach: { label: "St. Augustine Beach",         center: [-81.26540, 29.85680],   zoom: 17 },
            staugyfort:  { label: "St. Augustine Historic Fort", center: [-81.31180, 29.89810],   zoom: 16 },
            vilano:      { label: "Vilano Beach (Blue House)",   center: [-81.298978, 29.936989], zoom: 17 },
            ftpickens:   { label: "Fort Pickens",                center: [-87.290411, 30.327058], zoom: 15 }
        };

        // ── Layer definitions per location ────────────────────────────
        const layerData = {
            staugybeach: [
                {
                    id: "validated_viewsheds", label: "Validated Viewsheds", color: "#34d399",
                    layers: [
                        { id: "vvs_sab_00", name: "Validated VS — OBS-SAB-00", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/SAB_00_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false },
                        { id: "vvs_sab_04", name: "Validated VS — OBS-SAB-04", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/SAB_04_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false }
                    ]
                },
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            staugyfort: [
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            vilano: [
                {
                    id: "validated_viewsheds", label: "Validated Viewsheds", color: "#34d399",
                    layers: [
                        { id: "vvs_vb_00", name: "Validated VS — OBS-VB-00", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/VB_00_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false },
                        { id: "vvs_vb_04", name: "Validated VS — OBS-VB-04", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/VB_04_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false }
                    ]
                },
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            ftpickens: [

        function addImageLayer(layerDef) {
            if (activeLayers[layerDef.id]) return;
            let layer;
            if (layerDef.isMapServer && layerDef.url) {
                layer = new TileLayer({ url: layerDef.url, opacity: 0.75 });
            } else if (layerDef.portalItemId) {
                layer = new ImageryLayer({ portalItem: { id: layerDef.portalItemId }, opacity: 0.45 });
            } else if (layerDef.url) {
                layer = new ImageryTileLayer({ url: layerDef.url, opacity: 0.75 });
            } else {
                console.error("No URL or portalItemId for layer", layerDef.id); return;
            }
            // Insert NLCD/portal layers below viewshed layers so viewsheds always render on top
            if (layerDef.portalItemId) {
                // Find the lowest index of any active viewshed layer and insert below it
                const viewshedLayers = Object.values(activeLayers).filter((_, i) =>
                    Object.keys(activeLayers)[i].includes("vvs")
                );
                if (viewshedLayers.length > 0) {
                    const minIdx = Math.min(...viewshedLayers.map(l => map.layers.indexOf(l)));
                    map.layers.add(layer, minIdx);
                } else {
                    map.add(layer);
                }
            } else {
                map.add(layer);
            }
            activeLayers[layerDef.id] = layer;
            updateLegendVisibility();
        }

        function removeImageLayer(layerId) {
            if (activeLayers[layerId]) { map.remove(activeLayers[layerId]); delete activeLayers[layerId]; }
            updateLegendVisibility();
        }

        function removeAllImageLayers() {

        // ── Identify toggle ───────────────────────────────────────────
        let identifyMode = false;
        const identifyToggleBtn = document.getElementById("identifyToggleBtn");
        const viewDivEl2 = document.getElementById("viewDiv");
        let cachedScreenshot = null;

        async function captureScreenshot() {
            const screenshot = await view.takeScreenshot({ width: view.width, height: view.height });
            const img = new Image();
            img.src = screenshot.dataUrl;
            await new Promise(res => img.onload = res);
            const offscreen = document.createElement("canvas");
            offscreen.width = view.width;

        identifyToggleBtn.addEventListener("click", async () => {
            identifyMode = !identifyMode;
            identifyToggleBtn.classList.toggle("active", identifyMode);

                viewDivEl2.removeEventListener("touchstart", onTouchStart);
                viewDivEl2.removeEventListener("touchmove", onTouchMove);
                viewDivEl2.removeEventListener("touchend", onTouchEnd);
                identifyPopup.classList.remove("visible");
            } else {
                view.cursor = "crosshair";
                // Pre-capture screenshot when identify mode turns on
                await captureScreenshot();
                viewDivEl2.addEventListener("touchstart", onTouchStart, { passive: true });
                viewDivEl2.addEventListener("touchmove", onTouchMove, { passive: true });
                viewDivEl2.addEventListener("touchend", onTouchEnd);
            }
        });

        // Re-capture when map stops moving
        reactiveUtils.watch(
            () => view.stationary,

        const identifyPopup = document.getElementById("identifyPopup");
        const identifyLabel  = document.getElementById("identifyPopupLabel");
        const identifySwatch = document.getElementById("identifyPopupSwatch");
        const identifySub    = document.getElementById("identifyPopupSub");

        // ── Color-based pixel identify ────────────────────────────────
        // Tolerance for color matching (0-255 per channel)
        const COLOR_TOLERANCE = 30;

        // Expected colors per value — must match baked-in tile colormap
        // RGB values sampled on white/gray basemap at 0.75 opacity
        const VIEWSHED_COLORS = [
            { value: 0, r: 255, g: 189, b: 189, info: VIEWSHED_VALUES[0] },  // Not Visible
            { value: 1, r: 211, g: 255, b: 189, info: VIEWSHED_VALUES[1] },  // Visible
            { value: 2, r: 163, g: 255, b: 114, info: VIEWSHED_VALUES[2] },  // Seen
            { value: 3, r: 255, g: 126, b: 126, info: VIEWSHED_VALUES[3] }   // Unseen
        ];

        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
        }

        function matchColor(r, g, b, a) {
            // Transparent pixel — not within viewshed
            if (a < 50) return null;
            let best = null, bestDist = Infinity;
            for (const entry of VIEWSHED_COLORS) {
                const dist = colorDistance(r, g, b, entry.r, entry.g, entry.b);
                if (dist < bestDist) { bestDist = dist; best = entry; }
            }
            // Use a generous threshold to account for JPEG tile compression artifacts
            // but still require the pixel to be somewhat close to a known color
            return bestDist <= 35 ? best : null;
        }

        // Touch tracking — only used when identify mode is active
        let touchStartX = 0, touchStartY = 0;
        let touchMoved = false;
        let touchCount = 0;
        const TAP_MOVE_THRESHOLD = 8;

        function onTouchStart(e) {
            touchCount = e.touches.length;
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
            }
        }
        function onTouchMove(e) {
            if (e.touches.length > 1) { touchMoved = true; return; }
            const dx = Math.abs(e.touches[0].clientX - touchStartX);
            const dy = Math.abs(e.touches[0].clientY - touchStartY);
            if (dx > TAP_MOVE_THRESHOLD || dy > TAP_MOVE_THRESHOLD) touchMoved = true;
        }
        async function onTouchEnd(e) {
            if (touchMoved || touchCount > 1) return;
            if (!identifyMode) return;
            const viewshedLayers = Object.entries(activeLayers)
                .filter(([id]) => id.toLowerCase().includes("vvs"))
                .map(([, layer]) => layer);
            const nlcdLayer = activeLayers["lulc_study"];
            if (viewshedLayers.length === 0 && !nlcdLayer) return;

            const touch = e.changedTouches[0];
            const rect = viewDivEl2.getBoundingClientRect();
            const x = Math.round(touch.clientX - rect.left);
            const y = Math.round(touch.clientY - rect.top);

            // NLCD identify via ImageryLayer
            if (nlcdLayer && viewshedLayers.length === 0) {
                try {
                    const mapPoint = view.toMap({ x, y });
                    const result = await nlcdLayer.identify({
                        geometry: mapPoint,
                        returnCatalogItems: false
                    });
                    const val = parseInt(result?.value);
                    const info = NLCD_CLASSES[val];
                    if (info) {
                        identifyLabel.textContent = info.label;
                        identifySwatch.style.background = info.color;
                        identifySub.textContent = `Class ${val}`;
                    } else {
                        identifyLabel.textContent = `Value: ${val}`;
                        identifySwatch.style.background = "rgba(255,255,255,0.2)";
                        identifySub.textContent = "";
                    }
                    const px = Math.min(x + 12, window.innerWidth - 200);
                    const py = Math.min(y + 12, window.innerHeight - 100);
                    identifyPopup.style.left = px + "px";
                    identifyPopup.style.top  = py + "px";
                    identifyPopup.classList.add("visible");
                } catch(e) { console.warn("NLCD identify failed", e); }
                return;
            }

            if (!cachedCanvas) return;

            // Get tap position
            const ctx = cachedCanvas.getContext("2d");
            const sampleSize = 3, offset = Math.floor(sampleSize / 2);
            const pixels = ctx.getImageData(x - offset, y - offset, sampleSize, sampleSize).data;
            let rSum=0, gSum=0, bSum=0, aSum=0, count=0;
            for (let i = 0; i < pixels.length; i += 4) {
                rSum+=pixels[i]; gSum+=pixels[i+1]; bSum+=pixels[i+2]; aSum+=pixels[i+3]; count++;
            }
            const r=Math.round(rSum/count), g=Math.round(gSum/count),
                  b=Math.round(bSum/count), a=Math.round(aSum/count);

            const match = matchColor(r, g, b, a);
            if (match) {
                identifyLabel.textContent = match.info.label;
                identifySwatch.style.background = match.info.color;
                identifySub.textContent = match.info.sub;
                const px = Math.min(x + 12, window.innerWidth - 200);
                const py = Math.min(y + 12, window.innerHeight - 100);
                identifyPopup.style.left = px + "px";
                identifyPopup.style.top  = py + "px";
                identifyPopup.classList.add("visible");
            } else {
                identifyPopup.classList.remove("visible");
            }
        }

        view.on("click", async (event) => {
            // Always check blue house first
            const hitResponse = await view.hitTest(event);
            if (hitResponse.results.find(r => r.graphic === blueHouseGraphic)) {
                window.open(blueHouseGraphic.attributes.zillowUrl, "_blank");
                return;
            }

            // Touch identify is handled by touchend — only handle mouse clicks here
            if (event.native && event.native.pointerType === "touch") return;
            if (!identifyMode) return;
            const viewshedLayers = Object.entries(activeLayers)
                .filter(([id]) => id.toLowerCase().includes("vvs"))
                .map(([, layer]) => layer);
            if (viewshedLayers.length === 0) return;

            try {
                // If NLCD is active and no viewshed, use ImageryLayer identify
                const nlcdLayer = activeLayers["lulc_study"];
                if (nlcdLayer && viewshedLayers.length === 0) {
                    const result = await nlcdLayer.identify({
                        geometry: event.mapPoint,
                        returnCatalogItems: false
                    });
                    const val = parseInt(result?.value);
                    const info = NLCD_CLASSES[val];
                    const screenPt = view.toScreen(event.mapPoint);
                    const x = Math.round(screenPt.x);
                    const y = Math.round(screenPt.y);
                    if (info) {
                        identifyLabel.textContent = info.label;
                        identifySwatch.style.background = info.color;
                        identifySub.textContent = `Class ${val}`;
                    } else {
                        identifyLabel.textContent = `Value: ${val}`;
                        identifySwatch.style.background = "rgba(255,255,255,0.2)";
                        identifySub.textContent = "";
                    }
                    const px = Math.min(x + 12, window.innerWidth - 200);
                    const py = Math.min(y + 12, window.innerHeight - 100);
                    identifyPopup.style.left = px + "px";
                    identifyPopup.style.top  = py + "px";
                    identifyPopup.classList.add("visible");
                    return;
                }

                if (!cachedCanvas) return;
                const offscreen = cachedCanvas;
                const ctx = offscreen.getContext("2d");
                const screenPt = view.toScreen(event.mapPoint);
                const x = Math.round(screenPt.x);
                const y = Math.round(screenPt.y);
                // Sample 3x3 area and average to reduce compression noise
                const sampleSize = 3;
                const offset = Math.floor(sampleSize / 2);
                const pixels = ctx.getImageData(x - offset, y - offset, sampleSize, sampleSize).data;
                let rSum = 0, gSum = 0, bSum = 0, aSum = 0, count = 0;
                for (let i = 0; i < pixels.length; i += 4) {
                    rSum += pixels[i]; gSum += pixels[i+1]; bSum += pixels[i+2]; aSum += pixels[i+3];
                    count++;
                }
                const r = Math.round(rSum/count);
                const g = Math.round(gSum/count);
                const b = Math.round(bSum/count);
                const a = Math.round(aSum/count);

                const match = matchColor(r, g, b, a);

                if (match) {
                    identifyLabel.textContent = match.info.label;
                    identifySwatch.style.background = match.info.color;
                    identifySub.textContent = match.info.sub;
                } else {
                    // Clicked outside viewshed or on basemap
                    identifyPopup.classList.remove("visible");
                    return;
                }

                // Position popup near click, keep within viewport
                const px = Math.min(x + 12, window.innerWidth - 200);
                const py = Math.min(y + 12, window.innerHeight - 100);
                identifyPopup.style.left = px + "px";
                identifyPopup.style.top  = py + "px";
                identifyPopup.classList.add("visible");

            } catch(e) {
                console.warn("Identify failed", e);
            }
        });

        // Hide popup on map drag
        view.on("drag", () => identifyPopup.classList.remove("visible"));

        // ── Basemap switcher ──────────────────────────────────────────
        // Set viewDiv background for "none" basemap
        const viewDivEl = document.getElementById("viewDiv");

        document.querySelectorAll('.bm-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.dataset.basemap === "none") {
                    map.basemap = null;
                    viewDivEl.style.background = "#f0f0f0";
                } else {
                    map.basemap = btn.dataset.basemap;
                    viewDivEl.style.background = "";
                }
            });
        });
    </script>
</body>
</html>
