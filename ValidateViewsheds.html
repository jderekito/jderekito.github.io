            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            cursor: pointer;

        }
        #layerToggleBtn:hover { background: rgba(99,202,183,0.22); border-color: rgba(99,202,183,0.6); }
        #layerToggleBtn svg { flex-shrink: 0; }

            font-weight: 600;

            font-family: 'Syne', sans-serif;

        #layerPanelBody {

        /* ── Groups ── */

        .group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;

        .group-header:hover { background: rgba(255,255,255,0.04); }

        .group-chevron {
            width: 14px;
            height: 14px;
            color: rgba(255,255,255,0.3);
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .group-header.collapsed .group-chevron { transform: rotate(-90deg); }

        .group-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .group-title {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
            flex: 1;
        }

        .group-count {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: rgba(255,255,255,0.25);
        }

        .group-items {
            overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .group-items.collapsed { max-height: 0 !important; }

        /* ── Layer Row ── */
        .layer-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 14px 5px 36px;
            transition: background 0.12s;
            cursor: pointer;
        }
        .layer-row:hover { background: rgba(255,255,255,0.04); }

        .layer-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 3px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            transition: background 0.15s, border-color 0.15s;
        }
        .layer-row input[type="checkbox"]:checked {
            background: #63cab7;
            border-color: #63cab7;
        }
        .layer-row input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 3px; top: 1px;
            width: 5px; height: 8px;
            border: 1.5px solid #0a0e14;
            border-top: none; border-left: none;

            map: map,
            center: [-81.26540, 29.85680],
            zoom: 14

        // ── Blue House marker — 3560 Coastal Hwy, Saint Augustine FL ─
        const blueHousePoint = new Point({ longitude: -81.298981, latitude: 29.936989 });

        const blueHouseSymbol = {
            type: "picture-marker",
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" width="40" height="48">
                  <filter id="shadow">
                    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000066"/>
                  </filter>
                  <!-- Pin shape -->
                  <path d="M20 2 C10 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 30 2 20 2Z"
                        fill="#1a6fcc" stroke="white" stroke-width="2" filter="url(#shadow)"/>
                  <!-- House icon -->
                  <g transform="translate(20,19)" fill="white">
                    <!-- Roof -->
                    <polygon points="-9,0 0,-8 9,0" />
                    <!-- Body -->
                    <rect x="-7" y="0" width="14" height="9" />
                    <!-- Door -->
                    <rect x="-2.5" y="3" width="5" height="6" fill="#1a6fcc"/>

                    <rect x="3" y="1.5" width="3" height="3" fill="#1a6fcc"/>
                  </g>
                </svg>

            width: "28px",
            height: "34px",
            yoffset: "17px"

            geometry: blueHousePoint,
            symbol: blueHouseSymbol,
            attributes: {

                address: "3560 Coastal Hwy, Saint Augustine, FL 32084",
                zillowUrl: "https://www.zillow.com/homedetails/3560-Coastal-Hwy-Saint-Augustine-FL-32084/66755750_zpid/?utm_campaign=zillowwebmessage&utm_medium=referral&utm_source=txtshare"
            }
        });

        graphicsLayer.add(blueHouseGraphic);

        // ── Open Zillow on icon click ─────────────────────────────────
        view.on("click", async (event) => {
            const response = await view.hitTest(event);
            const hit = response.results.find(r => r.graphic === blueHouseGraphic);
            if (hit) {
                window.open(hit.graphic.attributes.zillowUrl, "_blank");
            }
        });

        // ── Pointer cursor on hover ───────────────────────────────────
        view.on("pointer-move", async (event) => {
            const response = await view.hitTest(event);
            const hit = response.results.find(r => r.graphic === blueHouseGraphic);
            view.cursor = hit ? "pointer" : "default";
        });

        let panelOpen = false;
        let collapsedGroups = {};

        const layerPanelBody = document.getElementById("layerPanelBody");
        const locationLabel = document.getElementById("locationLabel");
        const layerToggleBtn = document.getElementById("layerToggleBtn");

        layerToggleBtn.addEventListener("click", () => {
            panelOpen = !panelOpen;
            layerPanel.classList.toggle("hidden", !panelOpen);
        });

        // ── Render layer panel ───────────────────────────────────────
        function renderLayerPanel(locationKey) {
            const locConfig = locations[locationKey];
            const groups = layerData[locationKey];

            locationLabel.textContent = locConfig ? locConfig.label : "No location selected";

            if (!groups || groups.length === 0) {
                layerPanelBody.innerHTML = '<div class="no-layers">No layers available for this location</div>';
                return;
            }

            layerPanelBody.innerHTML = "";

            groups.forEach((group, gi) => {
                const isCollapsed = collapsedGroups[group.id] ?? false;
                const totalItems = group.layers.length;

                // Group wrapper
                const groupEl = document.createElement("div");
                groupEl.className = "layer-group";

                // Header
                const headerEl = document.createElement("div");
                headerEl.className = `group-header${isCollapsed ? " collapsed" : ""}`;
                headerEl.innerHTML = `
                    <svg class="group-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 6 8 10 12 6"/>
                    </svg>
                    <div class="group-dot" style="background:${group.color}"></div>
                    <span class="group-title">${group.label}</span>
                    <span class="group-count">${totalItems}</span>
                `;

                // Items container
                const itemsEl = document.createElement("div");
                itemsEl.className = `group-items${isCollapsed ? " collapsed" : ""}`;
                // Measure natural height after insert
                itemsEl.style.maxHeight = isCollapsed ? "0" : "600px";

                group.layers.forEach(layer => {
                    const rowEl = document.createElement("label");
                    rowEl.className = "layer-row";
                    rowEl.htmlFor = layer.id;

                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.id = layer.id;
                    cb.checked = layer.checked ?? false;
                    cb.addEventListener("change", () => {
                        layer.checked = cb.checked;
                        // TODO: toggle actual map layer visibility here
                        console.log(`Layer "${layer.name}" → ${cb.checked ? "ON" : "OFF"}`);
                    });

                    const nameEl = document.createElement("span");
                    nameEl.className = "layer-name";
                    nameEl.textContent = layer.name;

                    rowEl.appendChild(cb);
                    rowEl.appendChild(nameEl);

                    if (layer.badge) {
                        const badgeEl = document.createElement("span");
                        badgeEl.className = "layer-badge";
                        const isCheck = layer.badge === "✓";
                        badgeEl.style.cssText = `
                            background: ${isCheck ? "rgba(52,211,153,0.12)" : "rgba(255,255,255,0.07)"};
                            color: ${isCheck ? "#34d399" : "rgba(255,255,255,0.4)"};
                            border: 1px solid ${isCheck ? "rgba(52,211,153,0.3)" : "rgba(255,255,255,0.12)"};
                        `;
                        badgeEl.textContent = layer.badge;
                        rowEl.appendChild(badgeEl);
                    }

                    itemsEl.appendChild(rowEl);
                });

                // Collapse toggle
                headerEl.addEventListener("click", () => {
                    const collapsed = !headerEl.classList.contains("collapsed");
                    headerEl.classList.toggle("collapsed", collapsed);
                    itemsEl.classList.toggle("collapsed", collapsed);
                    itemsEl.style.maxHeight = collapsed ? "0" : "600px";
                    collapsedGroups[group.id] = collapsed;
                });

                groupEl.appendChild(headerEl);
                groupEl.appendChild(itemsEl);

                if (gi < groups.length - 1) {
                    const div = document.createElement("div");
                    div.className = "group-divider";
                    groupEl.appendChild(div);
                }

                layerPanelBody.appendChild(groupEl);
            });
        }

        // ── Location select ──────────────────────────────────────────
        document.getElementById("locationSelect").addEventListener("change", function (e) {
            const selected = e.target.value;
            if (locations[selected]) {
                view.goTo({
                    center: locations[selected].center,
                    zoom: locations[selected].zoom
                });
                collapsedGroups = {}; // reset collapse state for new location
                renderLayerPanel(selected);
                // Auto-open panel on first location pick
                if (!panelOpen) {
                    panelOpen = true;
                    layerPanel.classList.remove("hidden");
                }
            } else {
                locationLabel.textContent = "No location selected";
                layerPanelBody.innerHTML = '<div class="no-layers">Select a location to load layers</div>';
            }
        });
    </script>
</body>
</html>
