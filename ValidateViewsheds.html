<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS JS SDK - Basemap Viewer</title>


    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; font-family: 'Syne', sans-serif; }

        #topBar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #topBar label { color: rgba(255,255,255,0.55); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

        #locationSelect {
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: #fff;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 6px 10px; cursor: pointer; outline: none;
            transition: border-color 0.2s; min-width: 240px;
        }
        #locationSelect:hover { border-color: rgba(99,202,183,0.6); }
        #locationSelect option { background: #1a1f2b; color: #fff; }

        #layerToggleBtn {
            margin-left: auto; display: flex; align-items: center; gap: 7px;
            padding: 6px 13px; background: rgba(99,202,183,0.12);
            border: 1px solid rgba(99,202,183,0.35); border-radius: 6px;
            color: #63cab7; font-family: 'DM Mono', monospace; font-size: 11px;
            letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer;
            transition: background 0.2s, border-color 0.2s; white-space: nowrap;
        }
        #layerToggleBtn:hover { background: rgba(99,202,183,0.22); border-color: rgba(99,202,183,0.6); }

        #layerPanel {
            position: absolute; top: 52px; right: 16px; z-index: 15; width: 270px;
            background: rgba(10,14,20,0.92); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transform-origin: top right; transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #layerPanel.hidden { opacity: 0; pointer-events: none; transform: scale(0.96) translateY(-6px); }

        #layerPanelHeader {
            padding: 12px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        #layerPanelHeader span { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
        #locationLabel { font-size: 12px; font-weight: 600; color: #63cab7; font-family: 'Syne', sans-serif; letter-spacing: 0; text-transform: none; }

        #layerPanelBody { padding: 8px 0 10px; max-height: calc(100vh - 120px); overflow-y: auto; }
        #layerPanelBody::-webkit-scrollbar { width: 4px; }
        #layerPanelBody::-webkit-scrollbar-track { background: transparent; }
        #layerPanelBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .layer-group { margin-bottom: 4px; }
        .group-header { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; user-select: none; transition: background 0.15s; }
        .group-header:hover { background: rgba(255,255,255,0.04); }
        .group-chevron { width: 14px; height: 14px; color: rgba(255,255,255,0.3); flex-shrink: 0; transition: transform 0.2s; }
        .group-header.collapsed .group-chevron { transform: rotate(-90deg); }
        .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .group-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.65); flex: 1; }
        .group-count { font-size: 10px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.25); }
        .group-items { overflow: hidden; transition: max-height 0.25s ease; }
        .group-items.collapsed { max-height: 0 !important; }

        .layer-row { display: flex; align-items: center; gap: 10px; padding: 5px 14px 5px 36px; transition: background 0.12s; cursor: pointer; }
        .layer-row:hover { background: rgba(255,255,255,0.04); }
        .layer-row input[type="checkbox"] {
            appearance: none; -webkit-appearance: none; width: 14px; height: 14px;
            border: 1.5px solid rgba(255,255,255,0.25); border-radius: 3px;
            flex-shrink: 0; cursor: pointer; position: relative;
            transition: background 0.15s, border-color 0.15s;
        }
        .layer-row input[type="checkbox"]:checked { background: #63cab7; border-color: #63cab7; }
        .layer-row input[type="checkbox"]:checked::after {
            content: ''; position: absolute; left: 3px; top: 1px; width: 5px; height: 8px;
            border: 1.5px solid #0a0e14; border-top: none; border-left: none; transform: rotate(45deg);
        }
        .layer-name { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.75); flex: 1; line-height: 1.3; }
        .layer-badge { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
        .no-layers { padding: 18px 14px; text-align: center; color: rgba(255,255,255,0.25); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }
        .group-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 2px 14px; }

        #basemapWidget {
            position: absolute; bottom: 32px; left: 16px; z-index: 15;
            display: flex; flex-direction: column; gap: 6px;
        }
        .bm-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 11px; background: rgba(10,14,20,0.88);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
            color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
            cursor: pointer; transition: all 0.18s; backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .bm-btn:hover { background: rgba(99,202,183,0.12); border-color: rgba(99,202,183,0.4); color: #63cab7; }
        .bm-btn.active { background: rgba(99,202,183,0.15); border-color: #63cab7; color: #63cab7; }
        .bm-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; background-size: cover; }

        /* ── Mobile styles ─────────────────────────────────────── */
        @media (max-width: 768px) {
            #topBar { padding: 8px 12px; gap: 8px; }
            #topBar label { display: none; }
            #locationSelect { font-size: 12px; padding: 5px 8px; min-width: 0; flex: 1; }
            #layerToggleBtn { padding: 5px 10px; font-size: 10px; }

            #layerPanel { 
                width: calc(100vw - 24px); right: 12px; left: 12px;
                top: 48px; max-height: 50vh;
            }
            #layerPanelBody { max-height: calc(50vh - 60px); }

            #basemapWidget {
                bottom: 24px; left: 12px; flex-direction: row; gap: 6px;
            }
            .bm-btn { padding: 8px 10px; font-size: 10px; gap: 6px; }
            .bm-icon { width: 16px; height: 16px; }
        }

        @media (max-width: 480px) {
            #basemapWidget { bottom: 16px; left: 8px; right: 8px; justify-content: center; }
            .bm-btn { flex: 1; justify-content: center; }
        }

        #legendPanel {
            position: absolute; top: 52px; left: 16px; z-index: 15;
            background: rgba(10,14,20,0.88); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 10px 14px; min-width: 200px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #legendPanel.hidden { display: none; }
        #legendTitle {
            font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
            margin-bottom: 8px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .legend-row {
            display: flex; align-items: center; gap: 9px;
            padding: 4px 0;
        }
        .legend-swatch {
            width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .legend-label {
            font-size: 11px; font-family: 'Syne', sans-serif;
            color: rgba(255,255,255,0.75); flex: 1;
        }
        .legend-sub {
            font-size: 9px; font-family: 'DM Mono', monospace;
            color: rgba(255,255,255,0.3); letter-spacing: 0.04em;
        }

        @media (max-width: 768px) {
            #legendPanel { top: 48px; left: 12px; min-width: 170px; }
        }
    </style>
</head>
<body>
    <div id="topBar">
        <label for="locationSelect">Location</label>
        <select id="locationSelect">
            <option value="">— Select a site —</option>
            <option value="staugybeach">St. Augustine Beach</option>
            <option value="staugyfort">St. Augustine Historic Fort (A1A)</option>
            <option value="vilano">Vilano Beach (Blue House)</option>
            <option value="ftpickens">Fort Pickens (360 Imagery Example)</option>
        </select>
        <button id="layerToggleBtn" title="Toggle layer panel">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <rect x="1" y="2" width="14" height="3" rx="1"/>
                <rect x="1" y="7" width="14" height="3" rx="1"/>
                <rect x="1" y="12" width="14" height="3" rx="1"/>
            </svg>
            Layers
        </button>
    </div>

    <div id="layerPanel" class="hidden">
        <div id="layerPanelHeader">
            <span>Layer Picker</span>
            <span id="locationLabel">No location selected</span>
        </div>
        <div id="layerPanelBody">
            <div class="no-layers">Select a location to load layers</div>
        </div>
    </div>

    <div id="legendPanel">
        <div id="legendTitle">Viewshed Legend</div>
        <div class="legend-row">
            <div class="legend-swatch" style="background:#FFBEBE;"></div>
            <div>
                <div class="legend-label">Not Visible</div>
                <div class="legend-sub">True Negative</div>
            </div>
        </div>
        <div class="legend-row">
            <div class="legend-swatch" style="background:#D3FFBE;"></div>
            <div>
                <div class="legend-label">Visible</div>
                <div class="legend-sub">True Positive</div>
            </div>
        </div>
        <div class="legend-row">
            <div class="legend-swatch" style="background:#A3FF73;"></div>
            <div>
                <div class="legend-label">Seen</div>
                <div class="legend-sub">False Positive</div>
            </div>
        </div>
        <div class="legend-row">
            <div class="legend-swatch" style="background:#FF7F7F;"></div>
            <div>
                <div class="legend-label">Unseen</div>
                <div class="legend-sub">False Negative</div>
            </div>
        </div>
    </div>

    <div id="basemapWidget">
        <button class="bm-btn" data-basemap="osm">
            <span class="bm-icon" style="background:linear-gradient(135deg,#a8d5a2,#7ec8e3,#f5f5dc);"></span>
            Street
        </button>
        <button class="bm-btn" data-basemap="satellite">
            <span class="bm-icon" style="background:linear-gradient(135deg,#1a3a1a,#2d5a2d,#4a7c59);"></span>
            Satellite
        </button>
        <button class="bm-btn active" data-basemap="gray-vector">
            <span class="bm-icon" style="background:linear-gradient(135deg,#e8e8e8,#d0d0d0,#b8b8b8);"></span>
            Minimal
        </button>
    </div>

    <div id="viewDiv"></div>

    <script type="module">
        const [Map, MapView, GraphicsLayer, Graphic, Point, ImageryTileLayer, TileLayer] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/MapView.js",
            "@arcgis/core/layers/GraphicsLayer.js",
            "@arcgis/core/Graphic.js",
            "@arcgis/core/geometry/Point.js",
            "@arcgis/core/layers/ImageryTileLayer.js",
            "@arcgis/core/layers/TileLayer.js",
        ]);

        // ── Layer defs: direct URLs — layers shared publicly, no auth needed ──
        const SLR_LAYERS = [
            { id: "int_high_2040", name: "Intermediate High 2040", url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHigh_2040/ImageServer", badge: "2040", badgeStyle: "slr-high" },
            { id: "int_low_2040",  name: "Intermediate Low 2040",  url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntLow_2040/ImageServer",  badge: "2040", badgeStyle: "slr-low"  },
            { id: "int_high_2070", name: "Intermediate High 2070", url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHigh_2070/ImageServer", badge: "2070", badgeStyle: "slr-high" },
            { id: "int_low_2070",  name: "Intermediate Low 2070",  url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntLow_2070/ImageServer",  badge: "2070", badgeStyle: "slr-low"  },
            { id: "int_high_2100", name: "Intermediate High 2100", url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntHigh_2100/ImageServer", badge: "2100", badgeStyle: "slr-high" },
            { id: "int_low_2100",  name: "Intermediate Low 2100",  url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/IntLow_2100/ImageServer",  badge: "2100", badgeStyle: "slr-low"  }
        ];

        const LULC_LAYER = {
            id: "lulc_study", name: "LULC Study Area",
            url: "https://tiledimageservices.arcgis.com/eoP5lsTDzcIUyaQZ/arcgis/rest/services/LULC_StudyArea/ImageServer",
            badge: "LULC", badgeStyle: "lulc"
        };

        // ── Location config ───────────────────────────────────────────
        const locations = {
            staugybeach: { label: "St. Augustine Beach",         center: [-81.26540, 29.85680],   zoom: 17 },
            staugyfort:  { label: "St. Augustine Historic Fort", center: [-81.31180, 29.89810],   zoom: 16 },
            vilano:      { label: "Vilano Beach (Blue House)",   center: [-81.298978, 29.936989], zoom: 17 },
            ftpickens:   { label: "Fort Pickens",                center: [-87.290411, 30.327058], zoom: 15 }
        };

        // ── Layer definitions per location ────────────────────────────
        const layerData = {
            staugybeach: [
                {
                    id: "validated_viewsheds", label: "Validated Viewsheds", color: "#34d399",
                    layers: [
                        { id: "vvs_sab_00", name: "Validated VS — OBS-SAB-00", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/SAB_00_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false },
                        { id: "vvs_sab_04", name: "Validated VS — OBS-SAB-04", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/SAB_04_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false }
                    ]
                },
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            staugyfort: [
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            vilano: [
                {
                    id: "validated_viewsheds", label: "Validated Viewsheds", color: "#34d399",
                    layers: [
                        { id: "vvs_vb_00", name: "Validated VS — OBS-VB-00", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/VB_00_Viewshed_Validated_Clip2/MapServer", isMapServer: true, checked: false },
                        { id: "vvs_vb_04", name: "Validated VS — OBS-VB-04", badge: "✓", url: "https://tiles.arcgis.com/tiles/eoP5lsTDzcIUyaQZ/arcgis/rest/services/VB_04_Viewshed_Validated_Clip/MapServer", isMapServer: true, checked: false }
                    ]
                },
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ],
            ftpickens: [
                { id: "slr",     label: "Sea Level Rise",        color: "#4fa3e0", layers: SLR_LAYERS.map(l => ({ ...l, checked: false })) },
                { id: "landuse", label: "Land Use / Land Cover", color: "#a78bfa", layers: [{ ...LULC_LAYER, checked: false }] }
            ]
        };

        // ── Map setup ─────────────────────────────────────────────────
        const graphicsLayer = new GraphicsLayer();
        const map  = new Map({ basemap: "gray-vector", layers: [graphicsLayer] });
        const view = new MapView({ container: "viewDiv", map, center: [-81.26540, 29.85680], zoom: 14 });

        // ── Active layer cache ────────────────────────────────────────
        const activeLayers = {};


        function addImageLayer(layerDef) {
            if (activeLayers[layerDef.id]) return;
            if (!layerDef.url) { console.error("No URL for layer", layerDef.id); return; }
            const layer = layerDef.isMapServer
                ? new TileLayer({ url: layerDef.url, opacity: 0.75 })
                : new ImageryTileLayer({ url: layerDef.url, opacity: 0.75 });
            map.add(layer);
            activeLayers[layerDef.id] = layer;
        }

        function removeImageLayer(layerId) {
            if (activeLayers[layerId]) { map.remove(activeLayers[layerId]); delete activeLayers[layerId]; }
        }

        function removeAllImageLayers() {
            Object.keys(activeLayers).forEach(id => { map.remove(activeLayers[id]); delete activeLayers[id]; });
        }

        // ── Blue House marker ─────────────────────────────────────────
        const blueHousePoint = new Point({ longitude: -81.298981, latitude: 29.936989 });
        const blueHouseSymbol = {
            type: "picture-marker",
            url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" width="40" height="48">
                  <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000066"/></filter>
                  <path d="M20 2 C10 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 30 2 20 2Z"
                        fill="#1a6fcc" stroke="white" stroke-width="2" filter="url(#shadow)"/>
                  <g transform="translate(20,19)" fill="white">
                    <polygon points="-9,0 0,-8 9,0"/>
                    <rect x="-7" y="0" width="14" height="9"/>
                    <rect x="-2.5" y="3" width="5" height="6" fill="#1a6fcc"/>
                    <rect x="-6" y="1.5" width="3" height="3" fill="#1a6fcc"/>
                    <rect x="3" y="1.5" width="3" height="3" fill="#1a6fcc"/>
                  </g>
                </svg>
            `),
            width: "28px", height: "34px", yoffset: "17px"
        };
        const blueHouseGraphic = new Graphic({
            geometry: blueHousePoint, symbol: blueHouseSymbol,
            attributes: {
                name: "3560 Coastal Hwy",
                zillowUrl: "https://www.zillow.com/homedetails/3560-Coastal-Hwy-Saint-Augustine-FL-32084/66755750_zpid/"
            }
        });
        graphicsLayer.add(blueHouseGraphic);

        view.on("click", async (event) => {
            const response = await view.hitTest(event);
            const hit = response.results.find(r => r.graphic === blueHouseGraphic);
            if (hit) window.open(hit.graphic.attributes.zillowUrl, "_blank");
        });
        view.on("pointer-move", async (event) => {
            const response = await view.hitTest(event);
            view.cursor = response.results.find(r => r.graphic === blueHouseGraphic) ? "pointer" : "default";
        });

        // ── Layer panel state ─────────────────────────────────────────
        let panelOpen = false;
        let collapsedGroups = {};
        const layerPanel     = document.getElementById("layerPanel");
        const layerPanelBody = document.getElementById("layerPanelBody");
        const locationLabel  = document.getElementById("locationLabel");

        document.getElementById("layerToggleBtn").addEventListener("click", () => {
            panelOpen = !panelOpen;
            layerPanel.classList.toggle("hidden", !panelOpen);
        });

        function getBadgeStyle(badgeStyle, badge) {
            if (badge === "✓")             return "background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.3);";
            if (badgeStyle === "slr-high") return "background:rgba(79,163,224,0.14);color:#4fa3e0;border:1px solid rgba(79,163,224,0.3);";
            if (badgeStyle === "slr-low")  return "background:rgba(224,124,79,0.14);color:#e07c4f;border:1px solid rgba(224,124,79,0.3);";
            if (badgeStyle === "lulc")     return "background:rgba(167,139,250,0.14);color:#a78bfa;border:1px solid rgba(167,139,250,0.3);";
            return "background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.12);";
        }

        function renderLayerPanel(locationKey) {
            const locConfig = locations[locationKey];
            const groups    = layerData[locationKey];
            locationLabel.textContent = locConfig ? locConfig.label : "No location selected";
            if (!groups || groups.length === 0) {
                layerPanelBody.innerHTML = '<div class="no-layers">No layers available</div>';
                return;
            }
            layerPanelBody.innerHTML = "";
            groups.forEach((group, gi) => {
                const isCollapsed = collapsedGroups[group.id] ?? false;
                const groupEl  = document.createElement("div");
                groupEl.className = "layer-group";
                const headerEl = document.createElement("div");
                headerEl.className = `group-header${isCollapsed ? " collapsed" : ""}`;
                headerEl.innerHTML = `
                    <svg class="group-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 6 8 10 12 6"/>
                    </svg>
                    <div class="group-dot" style="background:${group.color}"></div>
                    <span class="group-title">${group.label}</span>
                    <span class="group-count">${group.layers.length}</span>
                `;
                const itemsEl = document.createElement("div");
                itemsEl.className = `group-items${isCollapsed ? " collapsed" : ""}`;
                itemsEl.style.maxHeight = isCollapsed ? "0" : "600px";

                group.layers.forEach(layer => {
                    const rowEl = document.createElement("label");
                    rowEl.className = "layer-row";
                    rowEl.htmlFor = layer.id;
                    const cb = document.createElement("input");
                    cb.type = "checkbox"; cb.id = layer.id; cb.checked = layer.checked ?? false;
                    cb.addEventListener("change", () => {
                        layer.checked = cb.checked;
                        cb.checked ? addImageLayer(layer) : removeImageLayer(layer.id);
                    });
                    const nameEl = document.createElement("span");
                    nameEl.className = "layer-name";
                    nameEl.textContent = layer.name;
                    rowEl.appendChild(cb);
                    rowEl.appendChild(nameEl);
                    if (layer.badge) {
                        const badgeEl = document.createElement("span");
                        badgeEl.className = "layer-badge";
                        badgeEl.style.cssText = getBadgeStyle(layer.badgeStyle, layer.badge);
                        badgeEl.textContent = layer.badge;
                        rowEl.appendChild(badgeEl);
                    }
                    itemsEl.appendChild(rowEl);
                });

                headerEl.addEventListener("click", () => {
                    const collapsed = !headerEl.classList.contains("collapsed");
                    headerEl.classList.toggle("collapsed", collapsed);
                    itemsEl.classList.toggle("collapsed", collapsed);
                    itemsEl.style.maxHeight = collapsed ? "0" : "600px";
                    collapsedGroups[group.id] = collapsed;
                });
                groupEl.appendChild(headerEl);
                groupEl.appendChild(itemsEl);
                if (gi < groups.length - 1) {
                    const div = document.createElement("div");
                    div.className = "group-divider";
                    groupEl.appendChild(div);
                }
                layerPanelBody.appendChild(groupEl);
            });
        }

        document.getElementById("locationSelect").addEventListener("change", function (e) {
            const selected = e.target.value;
            removeAllImageLayers();
            Object.values(layerData).forEach(groups =>
                groups.forEach(group => group.layers.forEach(layer => { layer.checked = false; }))
            );
            if (locations[selected]) {
                view.goTo({ center: locations[selected].center, zoom: locations[selected].zoom });
                collapsedGroups = {};
                renderLayerPanel(selected);
                if (!panelOpen) { panelOpen = true; layerPanel.classList.remove("hidden"); }
            } else {
                locationLabel.textContent = "No location selected";
                layerPanelBody.innerHTML = '<div class="no-layers">Select a location to load layers</div>';
            }
        });
        // ── Basemap switcher ──────────────────────────────────────────
        document.querySelectorAll('.bm-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                map.basemap = btn.dataset.basemap;
            });
        });
    </script>
</body>
</html>
