<html lang="en">
<head>

    <!-- Set API key BEFORE loading the SDK -->
    <script>
        var esriConfig = {
            apiKey: "AAPTxy8BH1VEsoebNVZXo8HurJJfSblLJIe_8rSwJUXo29Br4VITRFmQhcdF-HhMrMz450tmUGuM9ppX1qT156rvd5vlvHvif-5y5Ybl4LnL42vsnFRyudrBqLMdI_6SWUmbixFl1rjXoh-Z8qiJHMWE0FCU6KlAfh2EzEV9e0W_eWSZevrAUMycDCu8hhPgROCvXyB2udBrOFrPHH9O-3M6snJPDaGeN6GVbrrU_jFPzBXWx8MxctNb72LeGQDFohsLbY5sOhR4UeWrhl8T7tvrP5ic6r0RiNVt5NipU4bQBhst1gf7YXtrcLaFEpi5t_L6NB5XAFfI59jZKcrv6urLxVE7JxFHXcXMLGeE9z2pEaImv074IIuzvf1XvW6w4NUY-GeABI7BsYe7-PaVeX93xMMmxJ8r-xatJtGl_r90rlg.AT1_RgAPkDJo"
        };
    </script>

    <!-- Load ArcGIS Maps SDK for JavaScript 5.0 from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
        html, body, #viewDiv {
            padding: 0;
            margin: 0;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 5px; border-radius: 4px;">
        <label for="locationSelect">Go to location:</label>
        <select id="locationSelect">
            <option value="">--Select--</option>
            <option value="staugybeach">St. Augustine Beach</option>
            <option value="staugyfort">St. Augustine Historic Fort (A1A)</option>
            <option value="vilano">Vilano Beach (Blue House)</option>
            <option value="ftpickens">Fort Pickens (360 Imagery Example)</option>
        </select>
    </div>
    <div id="viewDiv"></div>

    <script type="module">
        const [Map, MapView] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/MapView.js"
        ]);

        const locations = {
            staugybeach: { center: [-81.26540, 29.85680], zoom: 15 },
            staugyfort:  { center: [-81.31180, 29.89810], zoom: 16 },
            vilano:      { center: [-81.29850, 29.92640], zoom: 15 },
            ftpickens:   { center: [-87.290411, 30.327058], zoom: 15 }
        };

        const map = new Map({
            basemap: "satellite"
        });

        const view = new MapView({
            container: "viewDiv",
            map: map,
            center: [-81.26540, 29.85680],
            zoom: 14
        });

        document.getElementById("locationSelect").addEventListener("change", function (e) {
            const selected = e.target.value;
            if (locations[selected]) {
                view.goTo({
                    center: locations[selected].center,
                    zoom: locations[selected].zoom
                });
            }
        });
    </script>
</body>
</html>
